<script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.6.0/dist/aframe-extras.min.js"></script>

<a-scene
  renderer="colorManagement: true; antialias: true"
  background="color: #dbe4ec"
  xr-mode-ui="enabled: true"
  loading-screen="dotsColor: #22d3ee; backgroundColor: #0f172a">

  <a-entity id="store"></a-entity>
  <a-entity id="route-layer"></a-entity>
  <a-entity id="selection-panel" position="0 1.55 5.15" rotation="0 0 0"></a-entity>

  <a-entity
    id="mouse-cursor"
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable; far: 20">
  </a-entity>

  <a-entity
    id="rig"
    movement-controls="controls: gamepad,keyboard,touch; speed: 0.18; fly: false"
    position="0 0 7">

    <a-entity
      id="camera"
      camera
      position="0 1.6 0"
      look-controls="pointerLockEnabled: true">
    </a-entity>

    <a-entity
      laser-controls="hand: left"
      cursor="rayOrigin: entity; fuse: false; downEvents: triggerdown; upEvents: triggerup"
      raycaster="objects: .clickable; far: 18"
      line="color: #22d3ee; opacity: 0.85">
    </a-entity>

    <a-entity
      laser-controls="hand: right"
      cursor="rayOrigin: entity; fuse: false; downEvents: triggerdown; upEvents: triggerup"
      raycaster="objects: .clickable; far: 18"
      line="color: #22d3ee; opacity: 0.85">
    </a-entity>
  </a-entity>
</a-scene>
